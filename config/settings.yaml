# =============================================================
# QTS V8 · 全局配置文件
# =============================================================

# ────── 数据库连接 ──────
databases:
  postgres:
    host: localhost
    port: 5432
    user: quant
    password: quant2024
    database: qts_ops
    pool_min: 2
    pool_max: 20

  timescaledb:
    host: localhost
    port: 5433
    user: quant
    password: quant2024
    database: qts_market
    pool_min: 5
    pool_max: 50

  clickhouse:
    host: localhost
    http_port: 8123
    native_port: 9000
    user: quant
    password: quant2024
    database: qts_hist

  redis:
    host: localhost
    port: 6379
    password: quant2024
    db: 0
    max_connections: 50

  kafka:
    bootstrap_servers:
      - localhost:9092
    group_id: qts_v8_consumer
    auto_offset_reset: latest

# ────── Crypto Streamer ──────
crypto_streamer:
  batch_size: 1000
  flush_interval_ms: 200
  pool_min: 2
  pool_max: 10
  channels:
    - crypto:tick
    - crypto:orderbook
    - crypto:ohlcv
    - crypto:funding_rate
    - crypto:mark_price
    - crypto:open_interest
    - crypto:liquidation
    - crypto:ls_ratio
    - crypto:regime

# ────── Crypto 交易所 API ──────
crypto:
  okx:
    env: demo               # demo | live
    ws_public: "wss://wspap.okx.com:8443/ws/v5/public"
    ws_private: "wss://wspap.okx.com:8443/ws/v5/private"
    rest: "https://www.okx.com"
    rate_limit_public: 20   # per 2 seconds
    rate_limit_private: 60  # per 2 seconds
    max_ws_connections: 30
  binance:
    env: demo               # demo | live
    ws: "wss://testnet.binance.vision/ws"
    rest: "https://testnet.binance.vision"
    rate_limit: 1200        # per minute

# ────── 传统市场 API ──────
equity:
  polygon:
    api_key: "${POLYGON_API_KEY}"
    ws: "wss://socket.polygon.io"
    rest: "https://api.polygon.io"
  alpaca:
    api_key: "${ALPACA_API_KEY}"
    api_secret: "${ALPACA_API_SECRET}"
    ws: "wss://stream.data.alpaca.markets/v2/iex"
    base_url: "https://paper-api.alpaca.markets"

futures:
  yfinance:
    proxy: "${YFINANCE_PROXY:-}"
    symbols:
      index: "ES,NQ,RTY,MES,MNQ"
      energy: "CL,NG,MCL"
      metals: "GC,SI,HG,MGC"
      rates: "ZN,ZB,ZF"
      grains: "ZC,ZS,ZW"
    cache_ttl_sec: 60
  cftc:
    cot_url: "https://www.cftc.gov/dea/newcot/deafut.txt"
    legacy_url: "https://www.cftc.gov/dea/newcot/deacbt.txt"
    update_cron: "0 18 * * 5"        # 每周五 ET 18:00 更新
    cache_ttl_sec: 86400              # 日级缓存
  term_structure:
    max_contracts: 4                  # 近 4 个月合约
    calc_calendar_spread: true
    build_curves_every: 60            # 每 60 秒重建曲线

options:
  cboe:
    api_key: "${CBOE_API_KEY}"
  tradier:
    api_key: "${TRADIER_API_KEY}"

fx:
  oanda:
    api_key: "${OANDA_API_KEY}"
    account_id: "${OANDA_ACCOUNT_ID}"
    environment: practice    # practice | live
    rest: "https://api-fxpractice.oanda.com/v3"

prediction:
  polymarket:
    ws: "wss://ws-subscriptions-clob.polymarket.com/ws"
    rest: "https://clob.polymarket.com"
    rate_limit: 15                     # req/sec
    max_active_markets: 100
    parity_threshold: 0.005            # 50bp 套利触发
    onchain:
      rpc: "wss://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
      track_events: "FPMMFundingAdded,FPMMFundingRemoved,FPMMBuy,FPMMSell"
  evolution:
    population_size: 250
    max_generation: 100
    tournament_k: 7
    mutation_rate: 0.15
    crossover_rate: 0.60
    elitism: 30                        # 保留 top 30
    promote_after_generations: 10

# ────── ML 推理 ──────
inference:
  triton:
    host: localhost
    http_port: 8000
    grpc_port: 8001
    model_name: alphacast_v2
    model_version: "1"
    max_batch_size: 32
    timeout_ms: 100

# ────── 特征工程 ──────
feature_engine:
  window_size: 60           # 60 步 5m K 线 = 5 小时
  feat_dim_crypto: 66       # 单步特征维数
  feat_dim_equity: 15       # Equity 日频因子
  feat_dim_futures: 22      # 期货：价格+期限结构+COT
  feat_dim_options: 18      # 期权：Greeks+VolSurface
  feat_dim_fx: 12           # FX 小时频因子
  feat_dim_prediction: 16   # 预测市场：CLOB+概率+流程
  precompute_ms: 200        # K 线闭合前预计算时间

# ────── 策略默认参数 ──────
strategy_defaults:
  max_pos_usd: 500
  max_daily_loss: 100
  max_leverage: 3.0
  g1_min_vol: 100
  g2_regime_mode: any       # any | trending | ranging
  g3_min_conf: 0.55
  g4_active: false
  g5_time_gate: true

# ────── Temperature Scaling 校准 ──────
calibration:
  trigger_fill_count: 50    # 每 N 笔成交触发一次校准
  min_labels: 1000          # 最小标签数才能校准
  ece_target: 0.05          # 目标 ECE < 5%
  t_initial: 1.0
  t_min: 0.5
  t_max: 3.0
  pause_threshold: 3        # 连续 N 次反向暂停

# ────── MetaLabeler ──────
metalabeler:
  min_labels: 5000          # 触发训练的标签数
  train_interval_days: 7
  auc_target: 0.55
  lift_target: 1.3          # Top Decile Lift
  threshold_default: 0.50

# ────── CFL 标签参数 ──────
cfl:
  barrier_up: 0.005         # +0.5%
  barrier_down: -0.005      # -0.5%
  barrier_timeout: 5        # 最大 5 根 K 线
  label_version: 1

# ────── 风控 ──────
risk:
  max_position_pct: 0.10    # 单品种最大仓位 10%
  max_drawdown: 0.15        # 最大回撤 15%
  max_daily_loss: 0.03      # 单日亏损上限 3%
  max_leverage: 3.0         # 最大杠杆
  max_sector_pct: 0.30      # 单行业最大仓位 30%

# ────── 日志 ──────
logging:
  level: INFO
  format: json              # json | text
  output: stdout            # stdout | file
